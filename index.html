<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術承継×職業病分析AI | REBAリスク評価</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-streaming@2.0.0"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="分析AI">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000000; overscroll-behavior: none; }
        header { position: relative; z-index: 300; background: white; }
        canvas#output-canvas { width: 100%; height: 100%; object-fit: contain; background: #000; }
        video#input-video { display: none; }
        .hidden { display: none; }
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: flex; align-items: center; justify-content: center; z-index: 200;
            padding: 20px;
        }
        #debug-log {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: rgba(0, 255, 0, 0.1); color: #00ff00; font-family: monospace;
            font-size: 10px; overflow-y: auto; z-index: 9999; padding: 5px;
            pointer-events: none; border-bottom: 1px solid #00ff00;
            display: block; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 max-w-lg mx-auto md:max-w-5xl">
    <div id="debug-log">System Initializing...</div>
    <header class="flex justify-between items-center mb-6 border-b pb-4 border-black">
        <h1 class="text-xl font-bold tracking-tighter uppercase">技術承継×職業病分析AI <span class="text-xs font-normal border-l border-black ml-2 pl-2">REBA評価</span></h1>
        <div id="status-badge" class="px-2 py-1 rounded text-[10px] font-bold border border-black flex items-center gap-1.5">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-400"></div>
            <span id="status-text">読み込み中</span>
        </div>
    </header>
    <div class="relative w-full aspect-video border border-black rounded-lg overflow-hidden mb-6 bg-black" id="viewport-container">
        <video id="input-video" playsinline webkit-playsinline muted></video>
        <canvas id="output-canvas"></canvas>
        
        <div id="processing-overlay" class="absolute inset-0 bg-white/90 flex flex-col items-center justify-center gap-4 transition-opacity">
            <div class="w-10 h-10 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-bold uppercase">AIモデル 準備中...</p>
        </div>
    </div>
    <div class="space-y-4 mb-24 flex-1">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-50 p-4 rounded border border-black">
                <span class="text-[10px] font-bold block mb-1 uppercase tracking-wider">REBA Score</span>
                <div class="flex items-end gap-2">
                    <span id="reba-score-value" class="text-4xl font-bold leading-none">1</span>
                    <span id="risk-level-badge" class="text-[10px] font-bold border border-black px-2 py-0.5 rounded uppercase">Negligible</span>
                </div>
            </div>
            <div class="bg-gray-50 p-4 rounded border border-black">
                <span class="text-[10px] font-bold block mb-1 uppercase tracking-wider">Joint Status</span>
                <div class="text-[10px] space-y-0.5">
                    <div class="flex justify-between"><span>腰部負荷:</span><span id="back-load-value" class="font-bold">0</span></div>
                    <div class="flex justify-between"><span>膝部負荷:</span><span id="knee-load-value" class="font-bold">0</span></div>
                </div>
            </div>
        </div>
        <div class="h-40 border border-black rounded p-2 overflow-hidden bg-white mb-4">
            <canvas id="main-chart"></canvas>
        </div>
    </div>
    <div id="setup-modal" class="modal">
        <div class="bg-white w-full max-w-sm p-8 border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <h2 class="text-xl font-bold mb-6 border-b-2 border-black pb-2 uppercase tracking-tighter">Analysis Setup</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold uppercase block mb-3">荷重 / 負荷 (Load/Force)</label>
                    <button type="button" id="btn-no-load" class="w-full border-2 border-dashed border-black py-2 text-xs font-bold hover:bg-gray-100 mb-2">道具なし (歩行・自重など)</button>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" class="load-btn border border-black py-2 text-xs font-bold" data-value="0">5kg未満</button>
                        <button type="button" class="load-btn border border-black py-2 text-xs font-bold" data-value="1">5-10kg</button>
                        <button type="button" class="load-btn border border-black py-2 text-xs font-bold" data-value="2">10kg以上</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase block mb-3">結合 / 把握 (Coupling)</label>
                    <select id="coupling-select" class="w-full border border-black p-2 text-xs font-bold">
                        <option value="0">良好 (Good)</option>
                        <option value="1">普通 (Fair)</option>
                        <option value="2">劣る (Poor)</option>
                        <option value="3">不適切 (Unacceptable)</option>
                    </select>
                </div>
                <button id="start-analysis" class="w-full bg-black text-white font-bold py-4 mt-4 hover:bg-gray-800 transition uppercase tracking-widest">
                    Start Analysis
                </button>
            </div>
        </div>
    </div>
    <!-- 他のパーツ（部位選択、フッター等）は省略可ですが、一旦基本形を維持 -->
    <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-lg bg-white border-2 border-black p-2 flex justify-around items-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-50">
        <button id="btn-stop" class="text-[8px] font-bold flex flex-col items-center">終了</button>
        <button id="btn-compare-toggle-v2" class="text-[8px] font-bold flex flex-col items-center">比較</button>
        <button id="btn-export-direct" class="text-[8px] font-bold flex flex-col items-center">CSV保存</button>
    </footer>
    <script type="module" src="main.js?v=2"></script>
</body>
</html>
