<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技術承継×職業病分析AI | REBA評価</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-streaming@2.0.0"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        :root { --accent: #000000; --safety: #00ff00; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; overscroll-behavior: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .hidden { display: none !important; }
        #debug-log { 
            position: fixed; top: 0; left: 0; right: 0; height: 100px; 
            background: rgba(0,255,0,0.1); color: #00ff00; font-family: monospace; 
            font-size: 10px; z-index: 1000; padding: 10px; overflow-y: auto;
            pointer-events: none; display: none;
        }
        canvas#output-canvas { width: 100%; height: 100%; object-fit: contain; }
        .glass-panel { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border: 1px solid #000; }
        .neon-border { border: 2px solid #000; box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .active-metric { background: #000 !important; color: #fff !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4">
    <div id="debug-log">System Logs...</div>
    <!-- Header -->
    <header class="flex justify-between items-center mb-6 border-b-2 border-black pb-4">
        <div class="flex flex-col">
            <h1 id="app-title" class="text-xl font-extrabold tracking-tighter uppercase leading-none cursor-pointer">技術承継×職業病分析AI</h1>
            <span class="text-[10px] font-bold opacity-60">BIOMECHANICAL REBA ANALYSIS V2.0</span>
        </div>
        <div id="status-badge" class="px-2 py-1 border border-black rounded flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-400"></div>
            <span id="status-text" class="text-[9px] font-black uppercase">Loading</span>
        </div>
    </header>
    <!-- Main Viewport -->
    <main class="flex-1 flex flex-col gap-6 max-w-5xl mx-auto w-full">
        <div class="relative w-full aspect-video bg-black neon-border overflow-hidden rounded-sm" id="viewport">
            <video id="input-video" playsinline muted loop webkit-playsinline style="position:absolute; opacity:0; pointer-events:none; width:1px; height:1px;"></video>
            <canvas id="output-canvas"></canvas>
            
            <!-- Floating Controls -->
            <div class="absolute top-4 left-4 flex flex-col gap-2">
                <div class="glass-panel px-2 py-1 text-[10px] font-bold flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> LIVE
                </div>
                <button id="btn-show-selector" class="glass-panel px-3 py-2 text-[10px] font-bold hover:bg-black hover:text-white transition uppercase">部位選択</button>
            </div>
            
            <div class="absolute bottom-4 right-4 flex gap-2">
                <button id="toggle-cam" class="glass-panel p-2 hover:bg-black hover:text-white transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </button>
                <label for="video-upload" class="glass-panel p-2 cursor-pointer hover:bg-black hover:text-white transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    <input type="file" id="video-upload" class="hidden" accept="video/*">
                </label>
                <button id="btn-record" class="bg-red-600 border border-black p-2 text-white hover:bg-red-700 transition">
                    <div id="record-icon" class="w-3 h-3 rounded-full bg-white"></div>
                </button>
            </div>
            <!-- Overlay for Model Loading -->
            <div id="processing-overlay" class="absolute inset-0 bg-white/95 flex flex-col items-center justify-center gap-4">
                <div class="w-12 h-12 border-4 border-black border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[10px] font-black uppercase tracking-widest">AI Engine Initializing</p>
            </div>
        </div>
        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="neon-border p-4 bg-gray-50">
                <span class="text-[9px] font-black uppercase mb-1 block">REBA Score</span>
                <div class="flex items-baseline gap-2">
                    <span id="reba-score-value" class="text-5xl font-black italic">1</span>
                    <span id="risk-level-badge" class="text-[8px] font-bold px-1.5 py-0.5 border border-black uppercase bg-green-400">Negligible</span>
                </div>
            </div>
            <div class="neon-border p-4 bg-gray-50 flex flex-col justify-center">
                <span class="text-[9px] font-black uppercase mb-2 block">Joint Status</span>
                <div class="space-y-1 text-[10px] font-bold uppercase">
                    <div class="flex justify-between"><span>腰部負荷:</span><span id="back-load-value">0</span></div>
                    <div class="flex justify-between"><span>膝部負荷:</span><span id="knee-load-value">0</span></div>
                </div>
            </div>
            <div class="col-span-2 neon-border h-32 bg-white p-2">
                <canvas id="main-chart"></canvas>
            </div>
        </div>
        <!-- Actions -->
        <div class="grid grid-cols-3 gap-2 pb-24">
            <button id="btn-stop" class="neon-border py-4 text-[10px] font-black uppercase bg-white hover:bg-black hover:text-white transition">解析終了</button>
            <button id="btn-compare-toggle-v2" class="neon-border py-4 text-[10px] font-black uppercase bg-white hover:bg-black hover:text-white transition">比較モード</button>
            <button id="btn-export-direct" class="neon-border py-4 text-[10px] font-black uppercase bg-white hover:bg-black hover:text-white transition">CSV保存</button>
        </div>
    </main>
    <!-- Modals -->
    <div id="setup-modal" class="modal">
        <div class="bg-white w-full max-w-sm p-8 neon-border">
            <h2 class="text-2xl font-black mb-8 border-b-4 border-black pb-2 uppercase italic tracking-tighter">Analysis Setup</h2>
            <div class="space-y-8">
                <div>
                    <label class="text-[9px] font-black uppercase block mb-4 border-l-4 border-black pl-2">荷重 / 負荷 (Load/Force)</label>
                    <button type="button" id="btn-no-load" class="w-full border-2 border-dashed border-black py-3 text-xs font-bold hover:bg-gray-100 mb-2 transition">道具なし (歩行・自重など)</button>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" class="load-btn border-2 border-black py-3 text-xs font-bold transition" data-value="0">5kg未満</button>
                        <button type="button" class="load-btn border-2 border-black py-3 text-xs font-bold transition" data-value="1">5-10kg</button>
                        <button type="button" class="load-btn border-2 border-black py-3 text-xs font-bold transition" data-value="2">10kg以上</button>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase block mb-4 border-l-4 border-black pl-2">結合 / 把握 (Coupling)</label>
                    <select id="coupling-select" class="w-full border-2 border-black p-3 text-xs font-black uppercase">
                        <option value="0">良好 (Good)</option>
                        <option value="1">普通 (Fair)</option>
                        <option value="2">劣る (Poor)</option>
                        <option value="3">不適切 (Unacceptable)</option>
                    </select>
                </div>
                <button id="start-analysis" class="w-full bg-black text-white font-black py-5 mt-6 hover:bg-zinc-800 transition uppercase tracking-widest text-sm shadow-[6px_6px_0px_0px_rgba(0,0,0,0.3)]">
                    Start Analysis
                </button>
            </div>
        </div>
    </div>
    <!-- 部位選択モーダル -->
    <div id="selector-modal" class="modal hidden">
        <div class="bg-white p-6 neon-border w-full max-w-sm flex flex-col items-center">
            <h3 class="text-lg font-black uppercase mb-4 border-b-2 border-black w-full text-center">部位選択</h3>
            <div class="relative w-48 h-80 bg-gray-100 mb-6 border border-black overflow-hidden bg-white">
                <svg viewBox="0 0 100 200" class="w-full h-full">
                    <path d="M50,10 L45,25 L55,25 Z" fill="#333" /> <!-- Head -->
                    <rect x="40" y="25" width="20" height="40" fill="#666" /> <!-- Chest -->
                    <circle id="p0" data-id="0" class="joint-point cursor-pointer" cx="50" cy="15" r="8" fill="#999" /> <!-- Nose -->
                    <circle id="p11" data-id="11" class="joint-point cursor-pointer" cx="40" cy="35" r="6" fill="#999" /> <!-- L-Shoulder -->
                    <circle id="p12" data-id="12" class="joint-point cursor-pointer" cx="60" cy="35" r="6" fill="#999" /> <!-- R-Shoulder -->
                    <circle id="p13" data-id="13" class="joint-point cursor-pointer" cx="35" cy="65" r="6" fill="#999" /> <!-- L-Elbow -->
                    <circle id="p23" data-id="23" class="joint-point cursor-pointer" cx="42" cy="110" r="6" fill="#999" /> <!-- L-Hip -->
                    <circle id="p24" data-id="24" class="joint-point cursor-pointer" cx="58" cy="110" r="6" fill="#999" /> <!-- R-Hip -->
                    <circle id="p25" data-id="25" class="joint-point cursor-pointer" cx="42" cy="150" r="6" fill="#999" /> <!-- L-Knee -->
                    <circle id="p26" data-id="26" class="joint-point cursor-pointer" cx="58" cy="150" r="6" fill="#999" /> <!-- R-Knee -->
                </svg>
            </div>
            <div class="grid grid-cols-2 gap-2 w-full mb-4">
                <button id="metric-angle" class="border-2 border-black py-2 text-[10px] font-black uppercase active-metric">角度解析</button>
                <button id="metric-velocity" class="border-2 border-black py-2 text-[10px] font-black uppercase">速度解析</button>
            </div>
            <select id="plane-select" class="w-full border-2 border-black p-2 text-[10px] font-black uppercase mb-4">
                <option value="XY">前面 (XY)</option>
                <option value="YZ">側面 (YZ)</option>
                <option value="XZ">上面 (XZ)</option>
            </select>
            <button id="btn-toggle-orbit" class="w-full border-2 border-black py-3 text-[10px] font-black uppercase hover:bg-black hover:text-white transition mb-2">軌跡: OFF</button>
            <button id="close-selector" class="w-full bg-black text-white py-3 text-[10px] font-black uppercase">閉じる</button>
        </div>
    </div>
    <!-- レポートモーダル -->
    <div id="report-container" class="modal hidden">
        <div class="bg-white w-full max-w-lg p-8 neon-border max-h-[85vh] flex flex-col">
            <h2 class="text-2xl font-black mb-6 border-b-4 border-black pb-2 uppercase italic tracking-tighter">Analysis Report</h2>
            <div id="ai-feedback" class="flex-1 overflow-y-auto mb-6 pr-2">
                <!-- Feedback generated by Clinical Engine -->
            </div>
            <div id="alignment-stats" class="grid grid-cols-2 gap-2 mb-6 text-[9px] font-bold uppercase">
                <!-- Stats injected here -->
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button id="btn-export-v2" class="border-2 border-black py-4 font-black uppercase text-xs hover:bg-black hover:text-white transition">CSV保存</button>
                <button id="close-report" class="bg-black text-white py-4 font-black uppercase text-xs">完了</button>
            </div>
        </div>
    </div>
    <!-- 比較モード用・隠しセクション -->
    <section id="comparison-section" class="modal hidden">
        <div class="bg-white w-full max-w-4xl p-6 neon-border flex flex-col gap-4">
            <h3 class="text-xl font-black uppercase border-b-2 border-black flex justify-between items-center">
                熟練度比較分析
                <button id="btn-compare-close" class="text-xs border border-black px-2">閉じる</button>
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <span class="text-[9px] font-black uppercase">Reference (Master)</span>
                    <div class="relative aspect-video bg-black neon-border overflow-hidden">
                        <video id="ref-video" class="hidden" playsinline muted loop></video>
                        <canvas id="ref-canvas" class="w-full h-full"></canvas>
                        <label for="ref-upload" class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 bg-black/60 transition cursor-pointer">
                            <span class="text-white text-[10px] font-bold border border-white px-2 py-1">動画を選択</span>
                            <input type="file" id="ref-upload" class="hidden" accept="video/*">
                        </label>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-[9px] font-black uppercase">Target (User)</span>
                    <div class="relative aspect-video bg-black neon-border overflow-hidden">
                        <video id="target-video" class="hidden" playsinline muted loop></video>
                        <canvas id="target-canvas" class="w-full h-full"></canvas>
                        <label for="target-upload" class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 bg-black/60 transition cursor-pointer">
                            <span class="text-white text-[10px] font-bold border border-white px-2 py-1">動画を選択</span>
                            <input type="file" id="target-upload" class="hidden" accept="video/*">
                        </label>
                    </div>
                </div>
            </div>
            <div class="flex justify-center gap-4">
                <button id="sync-play" class="bg-black text-white px-8 py-3 text-xs font-black uppercase">同時再生開始</button>
            </div>
        </div>
    </section>
    <!-- Error Catcher -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const logEl = document.getElementById('debug-log');
            if (logEl) {
                logEl.innerHTML += `<div style="color:red; font-weight:bold;"> [JS ERROR] ${msg} at ${line}:${col}</div>`;
            }
            return false;
        };
    </script>
    <script type="module" src="main.js?v=final"></script>
</body>
</html>
